version: '3.8'

services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: camp_project
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapp", "-papp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: ${APP_MODE:-dev-stage}
    develop:
      watch:
        - action: rebuild
          path: ./backend
          ignore:
            - ./backend/obj/
            - ./backend/bin/
            - ./backend/uploads/
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=camp_project;User=app;Password=app;
      - Cors__AllowedOrigins__0=http://localhost:8000
      - Cors__AllowedOrigins__1=http://127.0.0.1:8000
      - Cors__AllowedOrigins__2=http://abzabza.ru
      - Cors__AllowedOrigins__3=https://abzabza.ru
      - Cors__AllowedOrigins__4=http://44.194.248.98:8000
      - Jwt__SecretKey=gdbL7Y4PkEDTp8isj2MTLzlOMbCLmfCo
      - App__FrontendBaseUrl=http://localhost:8000
      - Authentication__Google__ClientId=846055016668-p8rj8p7n1a0kg6c7mobgigh796c98saf.apps.googleusercontent.com
      - Authentication__Google__ClientSecret=
      - Authentication__Facebook__AppId=
      - Authentication__Facebook__AppSecret=
      - Smtp__Host=smtp.gmail.com
      - Smtp__Port=587
      - Smtp__User=mailtestingchamber@gmail.com
      - Smtp__Password=migryirkejbeeuhw
      - Smtp__From=mailtestingchamber@gmail.com
      - DefaultAttributes__SystemUserEmail=srekhlyasov@gmail.com
      - DefaultAttributes__SystemUserPassword=1
      - FileStorage__RootPath=/app/uploads
      - FileStorage__RequestPath=/uploads
      - FileStorage__MaxFileSizeBytes=10485760
    volumes:
      - uploads_data:/app/uploads
      - dataprotection_data:/app/dataprotection-keys
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: ${APP_MODE:-dev-stage}
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    develop:
      watch:
        - path: ./frontend/src
          target: /app/src
          action: sync
        - path: ./frontend/index.html
          target: /app/index.html
          action: sync
        - path: ./frontend/package.json
          target: /app/package.json
          action: restart
        - path: ./frontend/pnpm-lock.yaml
          target: /app/pnpm-lock.yaml
          action: restart
        - path: ./frontend/vite.config.ts
          target: /app/vite.config.ts
          action: restart
    ports:
      - "8000:80"
    depends_on:
      - backend
      - phpmyadmin

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: app
      PMA_PASSWORD: app
      PMA_ABSOLUTE_URI: http://localhost:8000/phpmyadmin/
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  uploads_data:
  dataprotection_data:
  frontend_node_modules:
